name: Render Keep Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Validate health URL secret
        run: |
          if [ -z "${{ secrets.RENDER_HEALTHCHECK_URL }}" ]; then
            echo "Missing secret: RENDER_HEALTHCHECK_URL"
            exit 1
          fi

      - name: Ping Render health endpoint
        run: |
          curl --silent --show-error --fail \
            --max-time 15 \
            --retry 2 \
            --retry-delay 5 \
            "${{ secrets.RENDER_HEALTHCHECK_URL }}" > /dev/null
