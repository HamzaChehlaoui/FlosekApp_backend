# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=flosek
server.port=${PORT:${SERVER_PORT:8081}}
server.address=0.0.0.0
spring.config.import=optional:file:.env[.properties]

# ============================================
# DATABASE CONFIGURATION (PostgreSQL / Neon)
# ============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# Connection Pool (Hikari) - tuned for cloud DB latency
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:300000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:900000}
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE_MS:120000}
spring.datasource.hikari.initialization-fail-timeout=${DB_POOL_INIT_FAIL_TIMEOUT_MS:1}
spring.datasource.hikari.connection-test-query=SELECT 1

# PostgreSQL driver timeouts (seconds) - helps fail fast after platform/database idle sleep
spring.datasource.hikari.data-source-properties.connectTimeout=${DB_CONNECT_TIMEOUT_SEC:5}
spring.datasource.hikari.data-source-properties.socketTimeout=${DB_SOCKET_TIMEOUT_SEC:30}
spring.datasource.hikari.data-source-properties.tcpKeepAlive=true

# App-level DB keep-alive scheduler (milliseconds)
app.db.keepalive.enabled=${APP_DB_KEEPALIVE_ENABLED:true}
app.db.keepalive.interval-ms=${APP_DB_KEEPALIVE_INTERVAL_MS:240000}
app.db.keepalive.initial-delay-ms=${APP_DB_KEEPALIVE_INITIAL_DELAY_MS:120000}

# Naming Strategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=${JWT_SECRET:flosek-super-secret-key-change-in-production-2026}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# GOOGLE SSO CONFIGURATION
# ============================================
google.client-id=${GOOGLE_CLIENT_ID}

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.flosek.flosek=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.web=${SPRING_WEB_LOG_LEVEL:WARN}
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:WARN}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_BINDER_LOG_LEVEL:WARN}

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# JACKSON CONFIGURATION
# ============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ============================================
# ACTUATOR (Health Check) - Optional
# ============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
